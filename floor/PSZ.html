<!DOCTYPE html>
<html>
<head>
<title>Floor Directory</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef3f8;
    margin: 0;
    padding: 30px;
}

.card {
    max-width: 850px;
    margin: auto;
    background: white;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

h1 {
    color: #003366;
}

.floor {
    background: #f4f8ff;
    border-left: 6px solid #003366;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

.room {
    display: inline-block;
    background: #003366;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    margin: 5px;
}

button {
    background: #003366;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

<button onclick="history.back()">← Back to Campus Map</button>

<h1>📚 Perpustakaan Sultanah Zanariah</h1>
<p>Building floor directory and main facilities.</p>

<div class="floor">
<h2>Ground Floor</h2>
<span class="room">He & She Coffee</span>
<span class="room">Muzium</span>
<span class="room">Staircase</span>
</div>

<div class="floor">
<h2>1st Floor</h2>
<span class="room">Main Entrance</span>
<span class="room">Information Counter</span>
<span class="room">Reading Area</span>
<span class="room">Toilet</span>
<span class="room">Lift</span>
</div>


<div class="floor">
<h2>2 nd Floor</h2>
<span class="room">Research Area</span>
<span class="room">Quiet Zone</span>
<span class="room">Seminar Room</span>
</div>

</div>

</body>
</html>
